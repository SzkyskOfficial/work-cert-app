<!doctype html>
<html lang="ja" data-rev="rebuild-layout-v3">
<head>
  <meta charset="UTF-8" />
  <meta id="viewportMeta" name="viewport" content="width=1180, viewport-fit=cover" />
  <title>作業証明書アプリ (rebuild-layout-v3)</title>
  <style>
    :root {
      --paper-w: 980px;
      --paper-h: 1386px;
      --line: #222;
      /* 会社名～備考ブロックの外枠（タイトル行・フッターには付けない） */
      --paper-outer-border: 3px;
      --dot: #666;
      /* 初期値は adjustDensity（PDF12名列ロックと同じ refPx）で上書き。画面の作業員行高は人数では変えない */
      --worker-row-h: 70px;
      /* 作業内容行高は adjustDensity（画面では作業員行と同じ refPx）で上書き */
      --task-row-h: 84px;
      --remark-row-h: 48px;
      /* 請負・常庸列＝早・残列の幅 */
      --col-contract: 74px;
      /* ヘッダー：総工数・早・残の固定幅／確認印列（会社名ブロックは 1fr で残り） */
      --header-col-summary: 110px;
      --header-col-stamp: 146px;
    }
    * { box-sizing: border-box; }
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body { margin: 0; background: #eceff3; font-family: "Yu Gothic UI", "Meiryo", sans-serif; }
    .shared-sync-toast {
      position: fixed;
      right: 14px;
      top: 14px;
      z-index: 400;
      max-width: min(86vw, 320px);
      padding: 9px 12px;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      line-height: 1.35;
      background: rgba(25, 25, 28, 0.92);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.26);
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .shared-sync-toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .shared-sync-toast.success {
      background: rgba(14, 120, 57, 0.95);
    }
    .shared-sync-toast.warn {
      background: rgba(163, 91, 15, 0.95);
    }
    .shared-sync-toast.error {
      background: rgba(170, 34, 34, 0.95);
    }
    .app { max-width: 1180px; margin: 0 auto; padding: 16px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .toolbar button[data-lists-tab]:focus-visible {
      outline: 2px solid #3b7dd1;
      outline-offset: 2px;
    }
    .toolbar button[data-lists-tab].lists-tab-active {
      outline: 2px solid #3b7dd1;
      outline-offset: 2px;
      box-shadow: 0 0 0 1px rgba(59, 125, 209, 0.35);
    }
    button, input, select, textarea {
      font-family: inherit;
      touch-action: manipulation;
    }
    button { padding: 7px 10px; }
    .paper-wrap {
      background: #fff;
      border: 0;
      padding: 10px;
      overflow-x: auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* URL画面はPC画面と同一レイアウト。スマホでは viewport 幅固定でブラウザ側に縮小させる */
    /* 狭い画面：用紙 DOM は PC と同一。見た目だけ等比縮小（レイアウト数値は変えない） */
    .paper-scale-outer {
      width: 100%;
      max-width: 100%;
      display: flex;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
    }
    .paper-scale-inner {
      width: var(--paper-w);
      flex-shrink: 0;
    }
    body.pdf-render .paper-scale-inner {
      transform: none !important;
      zoom: 1 !important;
    }
    body.pdf-render .paper-scale-outer {
      height: auto !important;
      min-height: 0 !important;
    }
    #paper {
      width: var(--paper-w);
      min-height: var(--paper-h);
      margin: 0 auto;
      background: #fff;
      border: 0;
    }
    /* 作業証明書～曜日・フッター（株式会社～ロゴ）は枠なし。太枠は表本体のみ。
       上辺＝タイトル行と会社名グリッドの境の 3px（.header-grid 側では重ねない） */
    .paper-sheet-core {
      border: var(--paper-outer-border) solid var(--line);
    }
    /* 狭い画面：.paper-scale-inner で transform:scale。PDF 時は body.pdf-render で解除し #paper をそのまま焼く */

    .title-row {
      position: relative;
      /* 日付（30px級）の上欠けを防ぐため、固定高さより余裕を持たせる */
      min-height: 96px;
      height: auto;
      overflow: visible;
      border-bottom: 0;
      display: flex;
      justify-content: flex-start;
      align-items: stretch;
      font-weight: 700;
      font-size: 42px;
      letter-spacing: 11px;
      text-decoration: none;
    }
    .title-main {
      align-self: center;
      padding-left: 20px;
      text-decoration: underline;
      text-underline-offset: 8px;
      text-decoration-thickness: 1px;
    }
    .shift-toggle {
      position: absolute;
      right: 318px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
      letter-spacing: normal;
      white-space: nowrap;
    }
    .date-inline {
      position: absolute;
      right: 14px;
      bottom: 4px;
      /* 右端固定・幅一定で入力してもブロック位置がずれない */
      width: 22.5em;
      max-width: calc(100% - 24px);
      box-sizing: border-box;
      display: flex;
      flex-wrap: nowrap;
      /* 年月日ブロックと曜日の下辺で揃える */
      align-items: flex-end;
      justify-content: flex-end;
      gap: 0;
      font-size: 24px;
      letter-spacing: normal;
      line-height: 1.35;
      white-space: nowrap;
      text-align: right;
      overflow: visible;
    }
    /* 年・月・日（数字＋単位）だけをまとめて下詰め */
    .date-ymd {
      display: inline-flex;
      flex-wrap: nowrap;
      align-items: flex-end;
      gap: 0;
      font-size: inherit;
      line-height: 1;
    }
    .date-inline input {
      border: 0;
      border-bottom: 0;
      text-align: right;
      font-size: 24px;
      padding: 6px 0.08em 5px;
      background: transparent;
      font-variant-numeric: tabular-nums;
      flex: 0 0 auto;
      box-sizing: border-box;
      line-height: 1.35;
      min-height: 1.6em;
      overflow: visible;
    }
    .date-inline input#year,
    .date-inline input#month,
    .date-inline input#day {
      font-size: 30px;
      /* 欄内で数字を下詰め：余白を削り、行ボックスを字高に近づける */
      line-height: 1.05;
      padding: 0 0.08em 0;
      min-height: 0;
      height: 1.12em;
      -webkit-appearance: none;
      appearance: none;
    }
    .date-inline input#year {
      width: 5.5ch;
      min-width: 5.5ch;
    }
    .date-inline input#month,
    .date-inline input#day {
      width: 3.2ch;
      min-width: 3.2ch;
    }
    .date-inline .weekday-inline {
      font-weight: 700;
      font-size: 24px;
      margin-left: -0.56em;
      padding-left: 0;
      flex: 0 0 auto;
      min-width: 3.25em;
      text-align: right;
    }
    .circled { position: relative; display: inline-block; padding: 0 5px; cursor: pointer; }
    .circled.active::after {
      content: "";
      position: absolute;
      inset: -2px -4px;
      border: 1px solid var(--line);
      border-radius: 50%;
      pointer-events: none;
    }
    .t-row.contract-mark-hidden .circled.active::after {
      content: none;
    }

    .header-grid {
      display: grid;
      grid-template-columns: 1fr var(--header-col-summary) var(--header-col-summary) var(--header-col-stamp);
      /* 上辺の 3px は .paper-sheet-core の border-top のみ（二重にすると太く見える） */
      border-top: 0;
      /* 現場名行の下＝ヘッダーと作業員欄の境（外枠と同じ太さ） */
      border-bottom: var(--paper-outer-border) solid var(--line);
      height: 132px;
    }
    .header-cell {
      border-right: 1px solid var(--line);
      padding: 6px;
      font-size: 24px;
      overflow: visible;
    }
    .header-cell:last-child { border-right: 0; }
    .company-cell {
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      padding: 0;
    }
    .company-row-plain {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: stretch;
      gap: 6px;
      padding: 0 6px;
    }
    .company-row-plain .label,
    .company-row-plain .sama {
      align-self: center;
    }
    .company-row-plain + .company-row-plain {
      border-top: 1px solid var(--line);
    }
    .label { min-width: 84px; font-weight: 600; }
    .field {
      flex: 1;
      align-self: stretch;
      border: 0;
      border-bottom: 0;
      background: transparent;
      font-size: clamp(18px, 2vw, 24px);
      padding: 2px 4px;
      min-width: 0;
      min-height: 0;
      box-sizing: border-box;
    }
    .company-row-plain .field {
      align-self: stretch;
      line-height: 1.25;
      padding: 2px 4px;
    }
    /*
     * html2canvas の onclone でだけ #companyName / #siteName の input を span に差し替えたとき用。
     * 画面の input には存在しない（PDF クローン専用）
     */
    #paper .company-row-plain .header-field-pdf-value {
      flex: 1 1 auto;
      min-width: 0;
      align-self: center;
      display: flex;
      align-items: center;
      box-sizing: border-box;
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.25;
      font-weight: 400;
      color: #000;
      padding: 2px 4px;
      overflow: visible;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    /*
     * html2canvas の onclone でだけ .worker-name / .worker-ot の input を span に差し替えたとき用。
     * input は縦位置が焼き込みで欠けやすいため、flex で行の中央に揃える（画面の input には存在しない）。
     * 詳細度は body.pdf-render … .worker-name 等より上げる。
     */
    body.pdf-render #paper .w-row .name-wrap .worker-name-pdf-value,
    #paper[data-pdf-capture="1"] .w-row .name-wrap .worker-name-pdf-value,
    #paper[data-pdf-worker-col-lock="1"] .w-row .name-wrap .worker-name-pdf-value,
    #paper[data-pdf-worker-compress="1"] .w-row .name-wrap .worker-name-pdf-value {
      flex: 1 1 auto !important;
      align-self: stretch !important;
      min-height: 0 !important;
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
      align-items: center !important;
      justify-content: flex-start !important;
      box-sizing: border-box !important;
      font-size: clamp(14px, calc(var(--pdf-worker-row-h, var(--worker-row-h)) * 0.27), 28px) !important;
      line-height: 1.25 !important;
      font-weight: 400 !important;
      color: #000 !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
      white-space: nowrap !important;
      padding: 0 !important;
      margin: 0 !important;
    }
    body.pdf-render #paper .w-row .w-ot-cell .worker-ot-pdf-value.ot,
    #paper[data-pdf-capture="1"] .w-row .w-ot-cell .worker-ot-pdf-value.ot,
    #paper[data-pdf-worker-col-lock="1"] .w-row .w-ot-cell .worker-ot-pdf-value.ot,
    #paper[data-pdf-worker-compress="1"] .w-row .w-ot-cell .worker-ot-pdf-value.ot {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      flex: 1 1 auto !important;
      align-self: stretch !important;
      width: 100% !important;
      min-height: 0 !important;
      height: 100% !important;
      max-height: none !important;
      box-sizing: border-box !important;
      font-weight: 700 !important;
      font-variant-numeric: tabular-nums !important;
      text-align: center !important;
      font-size: clamp(15px, calc(var(--pdf-worker-row-h, var(--worker-row-h)) * 0.30), 30px) !important;
      line-height: 1 !important;
      padding: 1px 6px 6px 2px !important;
      color: #000 !important;
      margin: 0 !important;
      position: relative !important;
      z-index: 1 !important;
      overflow: visible !important;
      -webkit-appearance: none !important;
      appearance: none !important;
    }
    .sheet-target[readonly] {
      cursor: pointer;
      caret-color: transparent;
    }
    .sama {
      min-width: 28px;
      text-align: right;
      font-weight: 600;
      margin-left: 6px;
    }
    .summary-cell {
      display: grid;
      grid-template-rows: auto 1fr;
      padding: 0;
      overflow: visible;
      min-height: 0;
    }
    .summary-head {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      line-height: 18px;
      min-height: 18px;
      border-bottom: 1px solid var(--line);
    }
    .summary-val {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      height: 100%;
      min-height: 0;
      font-size: 30px;
      padding: 0;
      position: relative;
      text-align: center;
      overflow: visible;
    }
    .summary-val input {
      flex: 1 1 auto;
      width: 100%;
      min-width: 0;
      max-width: none;
      min-height: 0;
      height: 100%;
      border: 0;
      border-bottom: 0;
      background: transparent;
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      line-height: 1.35;
      font-variant-numeric: tabular-nums;
      /* 単位は右下オーバーレイのため左右パディングを同じにし、数字をセル左右中央に */
      padding: 0 26px;
      box-sizing: border-box;
      overflow: visible;
    }
    #totalWorkers,
    #totalOvertime { border-bottom: 0; }
    /*
     * html2canvas クローンのみ：総工数・早・残の input を span に差し替えた表示
     */
    #paper .summary-total-input-wrap .summary-total-pdf-value {
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      flex: 1 1 auto;
      width: 100%;
      min-width: 0;
      max-width: none;
      min-height: 0;
      height: 100%;
      margin: 0;
      padding: 0 26px;
      border: 0;
      background: transparent;
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      line-height: 1.35;
      font-variant-numeric: tabular-nums;
      color: #000;
    }
    .summary-total-input-wrap {
      position: relative;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-height: 0;
      width: 100%;
      max-width: none;
    }
    /* 単位：入力枠の右下に絶対配置オーバーレイ。文字はこの枠内で上下左右中央 */
    .summary-total-input-wrap .unit {
      position: absolute;
      right: 2px;
      bottom: 2px;
      width: 1.55em;
      height: 1.55em;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      font-weight: 600;
      pointer-events: none;
      color: #222;
    }
    .stamp-cell {
      display: grid;
      /* 総工数・早・残（.summary-cell）と同じ 2 行構成で行高を揃える */
      grid-template-rows: auto minmax(0, 1fr);
      padding: 0;
      min-height: 0;
    }
    .stamp-title {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      line-height: 18px;
      min-height: 18px;
      border-bottom: 1px solid var(--line);
    }
    .stamp-preview {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      padding: 0;
      min-height: 0;
    }
    .stamp-sign-slot {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: stretch;
      width: 100%;
      min-height: 0;
      flex: 1 1 auto;
      align-self: stretch;
      box-sizing: border-box;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    /* サイン画像を確認印の角丸枠内に厳密にクリップ（入力と同じ 2px） */
    .stamp-sign-slot.has-signature {
      overflow: hidden;
      border-radius: 2px;
      /* 入力の border 1px + padding 4px と同じオフセット用 */
      --sign-inset: 5px;
    }
    /* 他の readonly 記入欄と同じく sheet-target の input でタップを拾う */
    .stamp-sign-slot-input {
      flex: 1 1 auto;
      width: 100%;
      min-height: 44px;
      margin: 0;
      /* 通常は他の記入欄と同様のニュートラル枠（青はフォーカス／シート表示時のみ） */
      border: 1px solid #c5cad3;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.98);
      padding: 4px;
      box-sizing: border-box;
      font-size: 1px;
      line-height: 1;
      color: transparent;
      caret-color: transparent;
      cursor: pointer;
      text-align: center;
    }
    .stamp-sign-slot-input:hover {
      background: #fafbfc;
      border-color: #9aa0ac;
    }
    #signImage {
      display: none;
      position: absolute;
      box-sizing: border-box;
      /* 大きな PNG でも intrinsic に引っ張られないよう、枠内の明示サイズ＋ contain で全体を表示 */
      left: var(--sign-inset, 5px);
      top: var(--sign-inset, 5px);
      width: calc(100% - 2 * var(--sign-inset, 5px));
      height: calc(100% - 2 * var(--sign-inset, 5px));
      max-width: calc(100% - 2 * var(--sign-inset, 5px));
      max-height: calc(100% - 2 * var(--sign-inset, 5px));
      margin: 0;
      border: 0;
      outline: 0;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
      z-index: 1;
      filter: none;
    }
    .stamp-sign-slot.has-signature #signImage {
      display: block;
    }
    .workers {
      /* 作業内容グリッドの上の境 */
      border-bottom: var(--paper-outer-border) solid var(--line);
    }
    .workers-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    /* マウント前は workers 直下に置くが、ここでは見えないようにする */
    .workers > .workers-add-row {
      display: none !important;
    }
    .name-wrap .workers-add-row {
      position: absolute;
      right: 2px;
      top: 50%;
      bottom: auto;
      transform: translateY(-50%);
      display: flex !important;
      justify-content: flex-end;
      align-items: center;
      padding: 0;
      margin: 0;
      border: 0;
      background: transparent;
      pointer-events: none;
      z-index: 3;
    }
    .workers-add-btn {
      box-sizing: border-box;
      pointer-events: auto;
      padding: 0;
      margin: 0;
      border-radius: 50%;
      border: 1px solid #c5cad3;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: none;
      line-height: 1;
      color: #0a1a4a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
      font-weight: 900;
      letter-spacing: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .workers-add-btn:hover {
      background: #f4f6f9;
      border-color: #9aa0ac;
      color: #050a28;
    }
    .half { border-right: 1px solid var(--line); }
    .half:last-child { border-right: 0; }
    .w-head, .w-row {
      display: grid;
      grid-template-columns: 34px 1fr var(--col-contract);
    }
    .w-head { height: 32px; border-bottom: 1px solid var(--line); font-size: 13px; font-weight: 700; }
    .w-head > div, .w-row > div { border-right: 1px solid var(--line); display: flex; align-items: center; justify-content: center; }
    .w-head > div:last-child, .w-row > div:last-child { border-right: 0; }
    .w-row > div:nth-child(2) {
      align-items: stretch;
      justify-content: flex-start;
      flex-direction: column;
      min-height: 0;
      padding: 0 4px;
      position: relative;
    }
    .w-row .name-wrap:has(.workers-add-row) {
      overflow: visible;
    }
    .name-wrap .workers-add-btn {
      /* 〇を大きく、+ は青で円の中央（グリッド＋内側 span で幾何中心に寄せる） */
      --add-btn-size: min(64px, max(42px, calc(var(--worker-row-h) + 4px)));
      width: var(--add-btn-size);
      height: var(--add-btn-size);
      min-width: var(--add-btn-size);
      min-height: var(--add-btn-size);
      border-width: 1px;
      border-color: #c5cad3;
      color: #1565e6;
      font-size: 0;
      line-height: 0;
      display: grid;
      place-items: center;
      padding: 0;
      -webkit-text-stroke: 0;
      paint-order: normal;
    }
    .name-wrap .workers-add-btn .workers-add-plus {
      /* テキスト + はフォントでズレるため SVG で幾何中心に描画 */
      display: flex;
      align-items: center;
      justify-content: center;
      width: 82%;
      height: 82%;
      max-width: 100%;
      max-height: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      color: inherit;
      flex: 0 0 auto;
    }
    .name-wrap .workers-add-btn .workers-add-plus-svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }
    .name-wrap .workers-add-btn:hover {
      color: #0d47c4;
      border-color: #b8bdc7;
      background: rgba(255, 255, 255, 0.98);
    }

    const FIREBASE_CONFIG = {

      authDomain: "work-cert-app.firebaseapp.com",

    };
    const _scriptLoaders = new Map();
    function loadScriptOnce(src) {
      const u = String(src || "").trim();
      if (!u) return Promise.reject(new Error("missing src"));
      if (_scriptLoaders.has(u)) return _scriptLoaders.get(u);
      const p = new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = u;
        s.async = true;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error("failed to load: " + u));
        document.head.appendChild(s);
      });
      _scriptLoaders.set(u, p);
      return p;
    }
    async function ensurePdfLibs() {
      if (window.html2canvas && window.jspdf?.jsPDF) return;
      await loadScriptOnce("https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js");
      await loadScriptOnce("https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js");
    }
    async function ensureFirebaseLibs() {
      if (window.firebase?.initializeApp && window.firebase?.auth && window.firebase?.firestore) return;
      await Promise.all([
        loadScriptOnce("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"),
        loadScriptOnce("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"),
        loadScriptOnce("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"),
      ]);

    const remarkRows = document.getElementById("remarkRows");

    /** 読み用：全角カタカナ（ア〜ン）→ひらがな。既にひらがな・漢字等はそのまま */
    function normalizeReadingKey(s) {
      const t = String(s ?? "").trim();
      if (!t) return "";
      let out = "";
      for (const ch of t) {
        const c = ch.codePointAt(0);
        if (c >= 0x30a1 && c <= 0x30f6) out += String.fromCodePoint(c - 0x60);
        else out += ch;
      }
      return out;
    }
    function normalizeWorkerEntry(e) {
      if (e && typeof e === "object" && !Array.isArray(e)) {
        return {
          company: String(e.company ?? "").trim(),
          companyYomi: String(e.companyYomi ?? "").trim(),
          name: String(e.name ?? "").trim(),
          nameYomi: String(e.nameYomi ?? "").trim(),
        };
      }
      const s = String(e ?? "").trim();
      return { company: "", companyYomi: "", name: s, nameYomi: "" };
    }
    function formatWorkerEntry(e) {
      const w = normalizeWorkerEntry(e);
      if (w.company && w.name) return `${w.company}　${w.name}`;
      return w.name || w.company || "";
    }
    function workersEqual(a, b) {
      const A = normalizeWorkerEntry(a);
      const B = normalizeWorkerEntry(b);
      return A.company === B.company && A.name === B.name;
    }
    /** 文字列リストの重複（前後空白除き・完全一致）を除去 */
    function dedupeStringList(arr) {
      if (!Array.isArray(arr)) return [];
      const out = [];
      const seen = new Set();
      for (const x of arr) {
        const s = String(x ?? "").trim();
        if (!s || seen.has(s)) continue;
        seen.add(s);
        out.push(s);
      }
      return out;
    }
    /** 作業員は証明書に氏名のみ出すため、同一氏名は1件だけ残す（先勝ち） */
    function dedupeWorkersList(arr) {
      if (!Array.isArray(arr)) return [];
      const out = [];
      const seenName = new Set();
      for (const e of arr) {
        const w = normalizeWorkerEntry(e);
        if (!w.name) continue;
        if (seenName.has(w.name)) continue;
        seenName.add(w.name);
        out.push(w);
      }
      return out;
    }
    function migrateWorkersList() {
      if (!Array.isArray(lists.workers)) lists.workers = [];
      lists.workers = lists.workers.map((e) => normalizeWorkerEntry(e)).filter((w) => w.name || w.company);
      lists.workers = dedupeWorkersList(lists.workers);
    }
    function loadLists() {
      try {
        const t = localStorage.getItem(LISTS_KEY);
        if (t) Object.assign(lists, JSON.parse(t));
      } catch (_) {}
      lists.companies = sortJapaneseStrings(dedupeStringList(lists.companies), {
        pinToTop: COMPANY_PIN_TOP,
        modalScriptOrder: true,
      });
      lists.sites = sortJapaneseStrings(dedupeStringList(lists.sites), { modalScriptOrder: true });
      lists.workTypes = sortJapaneseStrings(dedupeStringList(lists.workTypes), { modalScriptOrder: true });
      lists.workSectors = sortJapaneseStrings(dedupeStringList(lists.workSectors), { modalScriptOrder: true });
      lists.workDetails = sortJapaneseStrings(dedupeStringList(lists.workDetails), { modalScriptOrder: true });
      migrateWorkersList();
      persistWorkersSorted();
      saveLists();
      const warm = () => {
        void warmModalListSortYomiCacheForStrings(collectAllModalListStringsForYomi())
          .then(() => {
            lists.companies = sortJapaneseStrings(dedupeStringList(lists.companies), {
              pinToTop: COMPANY_PIN_TOP,
              modalScriptOrder: true,
            });
            lists.sites = sortJapaneseStrings(dedupeStringList(lists.sites), { modalScriptOrder: true });
            lists.workTypes = sortJapaneseStrings(dedupeStringList(lists.workTypes), { modalScriptOrder: true });
            lists.workSectors = sortJapaneseStrings(dedupeStringList(lists.workSectors), { modalScriptOrder: true });
            lists.workDetails = sortJapaneseStrings(dedupeStringList(lists.workDetails), { modalScriptOrder: true });
            saveLists();
          })
          .catch(() => {});
      };
      if ("requestIdleCallback" in window) window.requestIdleCallback(warm, { timeout: 4000 });
      else setTimeout(warm, 2500);
    }
    function saveLists() {
      try {
        localStorage.setItem(LISTS_KEY, JSON.stringify(lists));
      } catch (_) {}
      scheduleSharedPush();
    }

    /** ページ読込のたび：作業員12・作業内容6・備考5（追加した行数は保存しない） */
    function resetGridRowsToDefault() {
      try {
        localStorage.removeItem("work-cert-grid-layout-v1");
      } catch (_) {}
      Object.assign(state, DEFAULT_GRID_ROWS);
    }

    const KANJI_RE = /[\u3400-\u4dbf\u4e00-\u9fff\uf900-\ufaff]/;
    function stringHasKanji(s) {
      return KANJI_RE.test(String(s ?? ""));
    }
    /** カタカナのみ→ひらがな。漢字は含まない想定のフォールバック用 */
    function syncYomiKanaOnly(s) {
      const t = String(s ?? "").trim();
      if (!t) return "";
      const y = normalizeReadingKey(t);
      return y || t;
    }
    function normalizeKuroshiroReading(s) {
      return String(s ?? "")
        .trim()
        .replace(/\u3000/g, " ")
        .replace(/\s+/g, " ");
    }

    /** Kuroshiro + Kuromoji（辞書は初回 CDN 取得）。失敗時は kuroshiroInst === null で固定 */
    let kuroshiroInst;
    let kuroInflight = null;
    async function ensureKuroshiro() {
      if (kuroshiroInst !== undefined) return kuroshiroInst;
      if (!kuroInflight) {
        kuroInflight = (async () => {
          try {
            const [{ default: Kuroshiro }, { default: KuromojiAnalyzer }] = await Promise.all([
              import("https://esm.sh/kuroshiro@1.2.0"),
              import("https://esm.sh/kuroshiro-analyzer-kuromoji@1.1.0"),
            ]);
            const k = new Kuroshiro();
            await k.init(
              new KuromojiAnalyzer({
                dictPath: "https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/dict/",
              }),
            );
            kuroshiroInst = k;
            return k;
          } catch (err) {
            console.warn(
              "Kuromoji/Kuroshiro の初期化に失敗しました（オフライン・ブロック時など）。読みはカタカナ→ひらがなのみの簡易変換にフォールバックします。",
              err,
            );
            kuroshiroInst = null;
            return null;
          } finally {
            kuroInflight = null;
          }
        })();
      }
      await kuroInflight;
      return kuroshiroInst;
    }
    /**
     * 所属会社・氏名の「読み」を自動補完。
     * 漢字を含むときは Kuroshiro でひらがな読み、それ以外は全角カタカナ→ひらがな。
     */
    async function autoYomiFromDisplayAsync(s) {
      const t = String(s ?? "").trim();
      if (!t) return "";
      if (!stringHasKanji(t)) return syncYomiKanaOnly(t);
      const k = await ensureKuroshiro();
      if (!k) return syncYomiKanaOnly(t);
      try {
        const raw = await k.convert(t, { to: "hiragana", mode: "normal" });
        const out = normalizeKuroshiroReading(raw);
        return out || syncYomiKanaOnly(t);
      } catch (_) {
        return syncYomiKanaOnly(t);
      }
    }

    /** 会社名・現場・作業内容モーダル用：表記だけの ja-JP 比較だと漢字の音読みで順序が直感とずれるため、比較キーにひらがな読みをキャッシュする */
    const modalListSortYomiCache = new Map();
    async function warmModalListSortYomiCacheForStrings(strings) {
      const uniq = [...new Set((strings || []).map((s) => String(s ?? "").trim()).filter(Boolean))];
      for (const s of uniq) {
        if (modalListSortYomiCache.has(s)) continue;
        try {
          const y = stringHasKanji(s) ? await autoYomiFromDisplayAsync(s) : syncYomiKanaOnly(s);
          modalListSortYomiCache.set(s, String(y || "").trim() || s);
        } catch (_) {
          modalListSortYomiCache.set(s, syncYomiKanaOnly(s) || s);
        }
        /** 連続 await でモバイルの描画・タップが詰まるのを避ける */
        await new Promise((r) => setTimeout(r, 0));
      }
    }
    async function warmModalListSortYomiCacheForTab(tabKey) {
      const spec = LISTS_TAB_SPEC[tabKey];
      if (!spec) return;
      const acc = [];
      for (const key of spec.keys) {
        if (key === "workers") continue;
        const arr = lists[key];
        if (Array.isArray(arr)) acc.push(...arr);
      }
      await warmModalListSortYomiCacheForStrings(acc);
    }
    function collectAllModalListStringsForYomi() {
      return [
        ...(lists.companies || []),
        ...(lists.sites || []),
        ...(lists.workTypes || []),
        ...(lists.workSectors || []),
        ...(lists.workDetails || []),
      ];
    }

    function workerReadingNeedsKuroRefresh(w) {
      if (stringHasKanji(w.name)) {
        const y = w.nameYomi;
        if (!y || y === w.name || stringHasKanji(y)) return true;
      }
      if (w.company && stringHasKanji(w.company)) {
        const y = w.companyYomi;
        if (!y || y === w.company || stringHasKanji(y)) return true;
      }
      return false;
    }
    /** 既存データ：漢字表記なのに読みが未整備の行だけ Kuroshiro で読みを再計算して保存 */
    async function refreshStoredWorkerReadingsFromKuroshiro() {
      if (!lists.workers.length) return;
      const need = lists.workers.some((e) => workerReadingNeedsKuroRefresh(normalizeWorkerEntry(e)));
      if (!need) return;
      const k = await ensureKuroshiro();
      if (!k) return;
      const uniqNames = [...new Set(lists.workers.map((e) => normalizeWorkerEntry(e).name).filter(Boolean))];
      const uniqCos = [...new Set(lists.workers.map((e) => normalizeWorkerEntry(e).company).filter(Boolean))];
      const nameToY = Object.create(null);
      for (const n of uniqNames) {
        nameToY[n] = await autoYomiFromDisplayAsync(n);
      }
      const coToY = Object.create(null);
      for (const c of uniqCos) {
        coToY[c] = await autoYomiFromDisplayAsync(c);
      }
      let changed = false;
      for (const e of lists.workers) {
        const w = normalizeWorkerEntry(e);
        const nay = nameToY[w.name] ?? w.nameYomi;
        const coy = w.company ? coToY[w.company] ?? w.companyYomi : "";
        if (w.nameYomi !== nay || w.companyYomi !== coy) {
          e.nameYomi = nay;
          e.companyYomi = coy;
          changed = true;
        }
      }
      if (changed) {
        persistWorkersSorted();
        saveLists();
      }
    }

    async function addWorkerIfNew(company, name) {
      const co = String(company ?? "").trim();
      const na = String(name ?? "").trim();
      if (!na) return;
      const nay = await autoYomiFromDisplayAsync(na);
      const coy = co ? await autoYomiFromDisplayAsync(co) : "";
      if (!Array.isArray(lists.workers)) lists.workers = [];
      if (lists.workers.some((e) => normalizeWorkerEntry(e).name === na)) return;
      lists.workers.push({ company: co, companyYomi: coy, name: na, nameYomi: nay });
      persistWorkersSorted();
      saveLists();
    }
    function removeWorker(val) {
      if (!Array.isArray(lists.workers)) return;
      const w =
        typeof val === "object" && val !== null && ("name" in val || "company" in val)
          ? normalizeWorkerEntry(val)
          : normalizeWorkerEntry({ company: "", name: val });
      const i = lists.workers.findIndex((e) => workersEqual(e, w));
      if (i === -1) return;
      lists.workers.splice(i, 1);
      persistWorkersSorted();
      saveLists();
    }
    function addIfNew(key, val) {
      if (!key || String(key).startsWith("_")) return;
      if (key === "workers") {
        const v = String(val || "").trim();
        if (!v) return;
        void addWorkerIfNew("", v).catch(() => {});
        return;
      }
      const v = String(val || "").trim();
      if (!v) return;
      const arr = lists[key];
      if (!Array.isArray(arr)) return;
      if (!arr.includes(v)) {
        arr.push(v);
        if (key === "companies") {
          lists.companies = sortJapaneseStrings([...lists.companies], {
            pinToTop: COMPANY_PIN_TOP,
            modalScriptOrder: true,
          });
        } else if (key === "sites") {
          lists.sites = sortJapaneseStrings([...lists.sites], { modalScriptOrder: true });
        } else if (key === "workTypes") {
          lists.workTypes = sortJapaneseStrings([...lists.workTypes], { modalScriptOrder: true });
        } else if (key === "workSectors") {
          lists.workSectors = sortJapaneseStrings([...lists.workSectors], { modalScriptOrder: true });
        } else if (key === "workDetails") {
          lists.workDetails = sortJapaneseStrings([...lists.workDetails], { modalScriptOrder: true });
        }
        saveLists();
        /** 読みキャッシュは Kuroshiro 取得で遅くなり得るため await しない（完了後に再ソート） */
        void warmModalListSortYomiCacheForStrings([v])
          .then(() => {
            if (key === "companies") {
              lists.companies = sortJapaneseStrings([...lists.companies], {
                pinToTop: COMPANY_PIN_TOP,
                modalScriptOrder: true,
              });
            } else if (key === "sites") {
              lists.sites = sortJapaneseStrings([...lists.sites], { modalScriptOrder: true });
            } else if (key === "workTypes") {
              lists.workTypes = sortJapaneseStrings([...lists.workTypes], { modalScriptOrder: true });
            } else if (key === "workSectors") {
              lists.workSectors = sortJapaneseStrings([...lists.workSectors], { modalScriptOrder: true });
            } else if (key === "workDetails") {
              lists.workDetails = sortJapaneseStrings([...lists.workDetails], { modalScriptOrder: true });
            }
            saveLists();
            if (listsModal?.classList.contains("active")) renderListsModalBody();
          })
          .catch(() => {});
      }
    }
    function removeListItem(key, val) {
      if (!key || String(key).startsWith("_")) return;
      if (key === "workers") {
        removeWorker(val);
        return;
      }
      const v = String(val || "").trim();
      if (!v) return;
      const arr = lists[key];
      if (!Array.isArray(arr)) return;
      const i = arr.indexOf(v);
      if (i === -1) return;
      arr.splice(i, 1);
      if (key === "workTypes" || key === "workSectors" || key === "workDetails") {
        normalizeWorkContentListsPersisted();
      } else {
        saveLists();
      }
    }

    /**
     * 日本語並び用：Intl.Collator（1字比較・最終タイブレークにも使用）
     */
    const JP_SORT_COLLATOR = new Intl.Collator("ja-JP", { sensitivity: "base", usage: "sort", numeric: true });
    const EN_SORT_COLLATOR = new Intl.Collator("en", { sensitivity: "base", usage: "sort", numeric: true });
    const COMPANY_PIN_TOP = "後大建設";

    /**
     * ツールバー系モーダル／記入シートの文字列リスト用の先頭字ブロック。
     * 0 = ひらがな・漢字（五十音系は ja-JP で） → 1 = カタカナ → 2 = 英字（半角・全角） → 3 = 数字・記号など
     */
    function toolbarModalPrimaryScriptTier(str) {
      const s = String(str ?? "").trim();
      if (!s) return 99;
      const c = s.codePointAt(0);
      if (c >= 0x3040 && c <= 0x309f) return 0;
      const isKanji =
        (c >= 0x4e00 && c <= 0x9fff) ||
        (c >= 0x3400 && c <= 0x4dbf) ||
        (c >= 0xf900 && c <= 0xfaff) ||
        c === 0x3005 ||
        c === 0x3006 ||
        c === 0x3007;
      if (isKanji) return 0;
      if ((c >= 0x30a0 && c <= 0x30ff) || c === 0x30fc || (c >= 0xff66 && c <= 0xff9f)) return 1;
      if ((c >= 0x41 && c <= 0x5a) || (c >= 0x61 && c <= 0x7a)) return 2;
      if ((c >= 0xff21 && c <= 0xff3a) || (c >= 0xff41 && c <= 0xff5a)) return 2;
      return 3;
    }

    /** 先頭ブロック順のあと、ブロック内は ja-JP または英字用 Collator（漢字表記は読みキャッシュがあれば読み同士で比較） */
    function compareToolbarModalStrings(a, b) {
      const sa = String(a ?? "").trim();
      const sb = String(b ?? "").trim();
      const ta = toolbarModalPrimaryScriptTier(sa);
      const tb = toolbarModalPrimaryScriptTier(sb);
      if (ta !== tb) return ta - tb;
      if (ta === 2) return EN_SORT_COLLATOR.compare(sa, sb);
      const ya = modalListSortYomiCache.get(sa);
      const yb = modalListSortYomiCache.get(sb);
      if (ya != null && yb != null) {
        return JP_SORT_COLLATOR.compare(ya, yb);
      }
      return JP_SORT_COLLATOR.compare(sa, sb);
    }

    /**
     * 1文字の種別（各桁の並び: ひらがな＋漢字 → カタカナ → その他 ＝数値 0→1→2）
     * - 漢字→読みに: 表記の漢字は読みキーで比較し、読みに残った漢字は **ひらがなと同じ先頭ブロック**（0）に寄せる。
     * - ひらがな→カタカナ→その他: ひらがな(0)、カタカナ(1)、英数字・記号・スペース等(2)。
     * 作業員・所属は **読み** をキーにするとよい（カタカナは normalizeReadingKey しない）。
     */
    function jpCharSortCategory(c) {
      if (typeof c !== "number" || c < 0) return 2;
      const isHiragana = c >= 0x3040 && c <= 0x309f;
      if (isHiragana) return 0;
      const isKanji =
        (c >= 0x4e00 && c <= 0x9fff) ||
        (c >= 0x3400 && c <= 0x4dbf) ||
        (c >= 0xf900 && c <= 0xfaff) ||
        c === 0x3005 ||
        c === 0x3006 ||
        c === 0x3007;
      if (isKanji) return 0;
      const isKatakana =
        (c >= 0x30a0 && c <= 0x30ff) || c === 0x30fc || (c >= 0xff66 && c <= 0xff9f);
      if (isKatakana) return 1;
      return 2;
    }

    /**
     * 文字列を「1文字目→2文字目→…」で比較（会社名・現場など表記のみのリスト用にも使用）。
     * 各位置で 種別(ひらがな＋漢字→カタカナ→その他) を先に比べ、同種別ならその1字を ja-JP で比較。
     * 前方一致なら短い方を先。
     */
    function compareCharsJapanLexico(a, b) {
      const charsA = [...String(a ?? "").trim()];
      const charsB = [...String(b ?? "").trim()];
      const n = Math.max(charsA.length, charsB.length);
      for (let i = 0; i < n; i++) {
        const hasA = i < charsA.length;
        const hasB = i < charsB.length;
        if (!hasA && !hasB) return 0;
        if (!hasA) return -1;
        if (!hasB) return 1;
        const ca = charsA[i].codePointAt(0);
        const cb = charsB[i].codePointAt(0);
        const ta = jpCharSortCategory(ca);
        const tb = jpCharSortCategory(cb);
        if (ta !== tb) return ta - tb;
        const ch = JP_SORT_COLLATOR.compare(charsA[i], charsB[i]);
        if (ch !== 0) return ch;
      }
      return 0;
    }

    /** 氏名：読みを並びキーに（全角カタカナは normalizeReadingKey しない）。読み未整備時は表記 */
    function workerNameLexicoKeyFromEntry(entry) {
      const w = normalizeWorkerEntry(entry);
      const y = String(w.nameYomi || "").trim() || String(w.name || "").trim();
      return y;
    }
    /** 氏名「表記」の先頭字種（ツールバー文字列と同じ 0→1→2→3）。並びの第1キーに使う */
    function workerNameDisplayScriptTier(entry) {
      const n = String(normalizeWorkerEntry(entry).name || "").trim();
      return toolbarModalPrimaryScriptTier(n);
    }
    /**
     * 同一所属内の氏名比較：先に **表記の先頭字種**（漢字・ひら／カタ／英字／その他）でブロック分け。
     * 同じブロック内は **読み→なければ表記** を Collator のみで比較（読みがひらがなでも表記がカタならカタブロックに留まる）。
     */
    function compareWorkerNamesDisplayScriptThenYomi(a, b) {
      const ta = workerNameDisplayScriptTier(a);
      const tb = workerNameDisplayScriptTier(b);
      if (ta !== tb) return ta - tb;
      const ka = workerNameLexicoKeyFromEntry(a);
      const kb = workerNameLexicoKeyFromEntry(b);
      if (ta === 2) return EN_SORT_COLLATOR.compare(ka, kb);
      return JP_SORT_COLLATOR.compare(ka, kb);
    }
    /** 所属キー（表記）：同じ所属の先頭レコードの companyYomi を読みに。無ければ表記（カタカナはそのまま） */
    function companyKeyLexicoKeyFromMap(displayKey, byCo) {
      const k = String(displayKey ?? "").trim();
      if (!k) return "";
      const ws = byCo.get(k);
      const yomi = ws && ws.length ? normalizeWorkerEntry(ws[0]).companyYomi : "";
      const y = String(yomi || "").trim() || k;
      return y;
    }

    /**
     * 後大建設「以外」の所属会社キー（表記）の並び。
     * 比較は **読み** を 1文字目から字種ルールで比較（読みのカタカナはひらがな化しない）。空キー "" は常に最後。
     */
    function createShozokuCompanyComparator(byCo) {
      return (a, b) => {
        if (a === "" && b !== "") return 1;
        if (b === "" && a !== "") return -1;
        return compareCharsJapanLexico(companyKeyLexicoKeyFromMap(a, byCo), companyKeyLexicoKeyFromMap(b, byCo));
      };
    }

    function sortJapaneseStrings(list, opts) {
      const pin = opts?.pinToTop;
      /** 五十音（ひら・漢字）→ カタカナ → アルファベット → その他、各ブロック内は Collator */
      const modalScriptOrder = opts?.modalScriptOrder === true;
      const trimmed = (list || []).map((s) => String(s).trim()).filter(Boolean);
      const pinHits = pin ? trimmed.filter((s) => s === pin) : [];
      const rest = pin ? trimmed.filter((s) => s !== pin) : [...trimmed];
      if (modalScriptOrder) {
        rest.sort(compareToolbarModalStrings);
      } else {
        rest.sort(compareCharsJapanLexico);
      }
      return [...pinHits, ...rest];
    }

    /** 作業内容（区分・工区・詳細）の保存配列をモーダルと同じルールで整列し保存する */
    function normalizeWorkContentListsPersisted() {
      lists.workTypes = sortJapaneseStrings(dedupeStringList(lists.workTypes), { modalScriptOrder: true });
      lists.workSectors = sortJapaneseStrings(dedupeStringList(lists.workSectors), { modalScriptOrder: true });
      lists.workDetails = sortJapaneseStrings(dedupeStringList(lists.workDetails), { modalScriptOrder: true });
      saveLists();
    }

    /**
     * 作業員リストの並び（用紙ポップアップ・リストモーダル共通）
     * 1. 所属会社「後大建設」のブロックを先頭に
     * 2. 後大建設以外の所属 … **所属の読み** を 1文字目から字種ルールで比較（空所属は最後）
     * 3. 同一所属内 … **氏名表記の先頭字種**でひら漢→カタ→英字→その他の順にブロック分けし、
     *    同ブロック内は **氏名キー**（読み→なければ表記）を ja-JP / en Collator で比較
     */
    function sortWorkerEntriesForSheet(workers) {
      const normalized = (workers || []).map((e) => normalizeWorkerEntry(e)).filter((w) => w.name);
      const byCo = new Map();
      for (const w of normalized) {
        const k = String(w.company ?? "").trim();
        if (!byCo.has(k)) byCo.set(k, []);
        byCo.get(k).push(w);
      }
      function sortWorkerNamesInGroup(ws) {
        ws.sort((a, b) => {
          return compareWorkerNamesDisplayScriptThenYomi(a, b);
        });
      }
      for (const [, ws] of byCo) {
        sortWorkerNamesInGroup(ws);
      }
      const keys = [...byCo.keys()];
      const pinKeys = keys.filter((k) => k === COMPANY_PIN_TOP);
      const restKeys = keys.filter((k) => k !== COMPANY_PIN_TOP).sort(createShozokuCompanyComparator(byCo));
      const out = [];
      for (const k of [...pinKeys, ...restKeys]) {
        out.push(...byCo.get(k));
      }
      return out;
    }

    /**
     * lists.workers をモーダル／用紙と同じルールで並べ替えて保存用配列に反映する。
     * sortWorkerEntriesForSheet は氏名ありのみを対象にするため、氏名なし行は元の相対順のまま末尾に連結する。
     */
    function persistWorkersSorted() {
      if (!Array.isArray(lists.workers)) {
        lists.workers = [];
        return;
      }
      const named = [];
      const unnamed = [];
      for (const e of lists.workers) {
        if (normalizeWorkerEntry(e).name) named.push(e);
        else unnamed.push(e);
      }
      lists.workers = [...sortWorkerEntriesForSheet(named), ...unnamed];
    }

    /** 早・残：0.25刻みの表示（四半刻み） */
    function formatOtStepValue(v) {
      const q = Math.round(v * 4);
      const r = q / 4;
      if (q % 4 === 0) return String(r);
      if (q % 2 === 0) return r.toFixed(1);
      return r.toFixed(2);
    }

    /** 早・残：0.25～10（0.25刻み）に丸め。0.25未満・不正は空 */
    function normalizeWorkerOt(raw) {
      const s = String(raw || "").trim().replace(",", ".");
      if (!s) return "";
      const n = parseFloat(s);
      if (isNaN(n)) return "";
      if (n < 0.25) return "";
      const clamped = Math.min(10, Math.max(0.25, n));
      const snapped = Math.round(clamped / 0.25) * 0.25;
      const v = Math.min(10, Math.max(0.25, snapped));
      return formatOtStepValue(v);
    }

    function overtimeSheetItems() {
      const out = [];
      for (let i = 1; i <= 40; i++) {
        out.push(formatOtStepValue(i / 4));
      }
      return out;
    }
    const fieldSheet = document.getElementById("fieldSheet");
    const fieldSheetPanel = fieldSheet.querySelector(".field-sheet-panel");
    const fieldSheetList = document.getElementById("fieldSheetList");
    let sheetTarget = null;
    let sheetListKey = "";

    function closeFieldSheet() {
      if (sheetTarget) {
        sheetTarget.classList.remove("is-field-sheet-open");
        try {
          if (document.activeElement === sheetTarget) sheetTarget.blur();
        } catch (_) {}
      }
      fieldSheet.classList.remove("active");
      fieldSheet.setAttribute("aria-hidden", "true");
      sheetTarget = null;
      sheetListKey = "";
      fieldSheetList.innerHTML = "";
      fieldSheetPanel.style.top = "";
      fieldSheetPanel.style.left = "";
      fieldSheetPanel.style.width = "";
      fieldSheetPanel.style.maxHeight = "";
    }

    function positionFieldSheetPanel(anchor) {
      const rect = anchor.getBoundingClientRect();
      const margin = 8;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const w = Math.min(360, Math.max(220, vw - margin * 2));
      let left = rect.left + rect.width / 2 - w / 2;
      left = Math.max(margin, Math.min(left, vw - w - margin));
      fieldSheetPanel.style.width = w + "px";
      fieldSheetPanel.style.left = left + "px";
      const maxH = Math.min(320, Math.floor(vh * 0.65));
      fieldSheetPanel.style.maxHeight = maxH + "px";

      let top = rect.bottom + margin;
      const ph = fieldSheetPanel.offsetHeight || 160;
      if (top + ph > vh - margin) {
        top = rect.top - ph - margin;
      }
      if (top < margin) top = margin;
      fieldSheetPanel.style.top = top + "px";
    }

    function openFieldSheet(input, listKey) {
      if (listKey === "_signature") {
        if (!sigModal || sigModal.classList.contains("active")) return;
        if (fieldSheet.classList.contains("active")) closeFieldSheet();
        else if (sheetTarget && sheetTarget !== input) closeFieldSheet();
        sheetTarget = input;
        sheetListKey = "_signature";
        input.classList.add("is-field-sheet-open");
        sigModal.classList.add("active");
        resizeCanvas();
        return;
      }
      if (sigModal && sigModal.classList.contains("active")) sigModal.classList.remove("active");
      if (sheetTarget === input && fieldSheet.classList.contains("active")) return;
      if (sheetTarget && sheetTarget !== input) closeFieldSheet();
      sheetTarget = input;
      sheetListKey = listKey;
      input.classList.add("is-field-sheet-open");
      let arr;
      if (listKey === "_overtime") {
        arr = overtimeSheetItems();
      } else if (listKey === "companies") {
        arr = sortJapaneseStrings(lists.companies || [], { pinToTop: COMPANY_PIN_TOP, modalScriptOrder: true });
      } else if (listKey === "sites") {
        arr = sortJapaneseStrings(lists.sites || [], { modalScriptOrder: true });
      } else if (listKey === "workers") {
        arr = sortWorkerEntriesForSheet(lists.workers || []);
      } else if (listKey === "workTypes") {
        arr = sortJapaneseStrings(lists.workTypes || [], { modalScriptOrder: true });
      } else if (listKey === "workSectors") {
        arr = sortJapaneseStrings(lists.workSectors || [], { modalScriptOrder: true });
      } else if (listKey === "workDetails") {
        arr = sortJapaneseStrings(lists.workDetails || [], { modalScriptOrder: true });
      } else {
        arr = [...(lists[listKey] || [])].reverse();
      }
      fieldSheetList.innerHTML = "";
      const otSuffix = listKey === "_overtime" ? (input.dataset.otUnit || "ｈ") : "";
      arr.forEach((v) => {
        const display =
          listKey === "workers"
            ? formatWorkerEntry(v)
            : listKey === "_overtime"
              ? `${v} ${otSuffix}`
              : v;
        if (!display && listKey !== "_overtime") return;
        if (listKey === "_overtime" && !v) return;
        const b = document.createElement("button");
        b.type = "button";
        b.className = "field-sheet-item";
        b.textContent = listKey === "_overtime" ? `${v} ${otSuffix}` : display;
        b.title = listKey === "_overtime" ? `${v} ${otSuffix}` : display;
        b.addEventListener("click", () => {
          /* 作業証明書の作業員欄には所属会社を出さない（シート候補は formatWorkerEntry で区別） */
          input.value = listKey === "workers" ? normalizeWorkerEntry(v).name : v;
          input.readOnly = true;
          input.classList.remove("sheet-await-direct");
          input.dispatchEvent(new Event("input", { bubbles: true }));
          if (input.classList.contains("worker-name") || input.classList.contains("worker-ot")) refreshTotals();
          closeFieldSheet();
        });
        const li = document.createElement("li");
        li.appendChild(b);
        fieldSheetList.appendChild(li);
      });
      fieldSheet.classList.add("active");
      fieldSheet.setAttribute("aria-hidden", "false");
      document.querySelectorAll(".sheet-target.sheet-await-direct").forEach((el) => {
        if (el !== input) el.classList.remove("sheet-await-direct");
      });
      input.classList.add("sheet-await-direct");
      try {
        input.scrollIntoView({ block: "nearest", inline: "nearest" });
      } catch (_) {}
      requestAnimationFrame(() => {
        positionFieldSheetPanel(input);
        requestAnimationFrame(() => {
          positionFieldSheetPanel(input);
          try {
            input.focus({ preventScroll: true });
          } catch (_) {}
        });
      });
    }

    function focusSheetTargetDirect(t) {

    document.addEventListener(
      "pointerdown",
      (e) => {
        if (!fieldSheet.classList.contains("active")) return;
        if (fieldSheetPanel.contains(e.target)) return;
        const anchor = sheetTarget;
        /* 一覧表示中は背後の全画面 backdrop が記入欄の上に乗るため、座標が青枠内なら「もう一度押した」とみなす */
        if (
          anchor &&
          anchor.readOnly &&
          anchor.dataset.listKey &&
          anchor.dataset.listKey !== "_signature"
        ) {
          const r = anchor.getBoundingClientRect();
          if (
            e.clientX >= r.left &&
            e.clientX <= r.right &&
            e.clientY >= r.top &&
            e.clientY <= r.bottom
          ) {
            e.preventDefault();
            e.stopPropagation();
            closeFieldSheet();
            focusSheetTargetDirect(anchor);
            return;
          }
        }
        const t = e.target.closest(".sheet-target");
        if (t && t === sheetTarget && t.readOnly && t.dataset.listKey && t.dataset.listKey !== "_signature") {
          e.preventDefault();
          e.stopPropagation();
          closeFieldSheet();
          focusSheetTargetDirect(t);
          return;
        }
        e.preventDefault();
        e.stopPropagation();
        /* パネル外は常にキャンセル（別の記入欄をタップしても即切替えしない。サインと同じ操作感） */
        closeFieldSheet();

    document.getElementById("paper").addEventListener("pointerdown", (e) => {

      if (t.classList.contains("sheet-await-direct")) {

      openFieldSheet(t, t.dataset.listKey);

    /** adjustDensity と同じ段階の行高（px 数値）。PDF の「12名時基準」にも使用 */
    function densityRowHeightPx(n) {
      /*
       * 画面（adjustDensity）：作業・備考の行数で 48→40 のように段を切り替えると、何行目かで枠・縦線がズレて見える。
       * そのため「最小幅 40px」の段は使わず、n>=10 は常に 48px 基準に固定する（21 行以降も同様にズレない）。
       * より段を詰めたい n<=9, 8, 7 以下は従来どおり。PDF の ref は PDF_LOCK_FRAME_DENSITY_N（通常 12）のみで決まる。
       */
      if (n > 9) return 48;
      if (n > 7) return 54;
      return 62;
    }

    /** PDF 列ロックの基準行高に加算する分。画面の作業員行高も同式で揃える */
    const PDF_WORKER_COL_REF_EXTRA_PX = 22;
    /** PDF 作業内容列ロック: #taskRows 合計に「行数×この値」を加算（0＝6×ref のみで 6段と7段の合計を揃える） */
    const PDF_TASK_COL_LOCK_PER_ROW_BUMP_PX = 0;
    /** PDF 列ロックの枠を決める density 用の段数（作業・備考の行数では切り替えない） */
    const PDF_LOCK_FRAME_DENSITY_N = 12;
    /**
     * PDF 列ロック時の 1 段あたり ref（density+EXTRA）。
     * 作業段数・備考段数では密度段階を切り替えず、常に density(PDF_LOCK_FRAME_DENSITY_N)。
     * 合計枠（6×ref・作業員列・備考の 5×ref 由来）は一定で、ブロック内は行数の均等割りのみで詰まる。
     */
    function pdfTaskColLockRefPx(_taskCount, _remarkCount) {
      return densityRowHeightPx(PDF_LOCK_FRAME_DENSITY_N) + PDF_WORKER_COL_REF_EXTRA_PX;
    }
    /** `#taskRows` データ列の合計高（6×ref＋行×BUMP） */
    function pdfTaskColLockTotalDataHeightPx(taskCount, remarkCount) {
      const taskRefPx = pdfTaskColLockRefPx(taskCount, remarkCount);
      return 6 * taskRefPx + taskCount * PDF_TASK_COL_LOCK_PER_ROW_BUMP_PX;
    }
    /** 1 行あたりの高さ（PDF の `--pdf-task-row-h` のみ。画面の作業内容行高は別途作業員と揃える） */
    function pdfTaskColLockEachRowPx(taskCount, remarkCount) {
      const tc = taskCount;
      if (tc < 1) return densityRowHeightPx(12);
      return pdfTaskColLockTotalDataHeightPx(tc, remarkCount) / tc;
    }
    /** PDF 備考列ロックのみ: 合計高を常に 5×ref（実際の備考行数で割る＝5段と6段で合計を揃える）。画面には付けない */
    const PDF_REMARK_COL_LOCK_BASE_ROWS = 5;
    const PDF_REMARK_COL_LOCK_PER_ROW_BUMP_PX = 0;
    /** PDF 備考ロックの「5段分の合計高」に掛ける係数。行が6以上でも合計 px はこの式のまま（行数で均等割りのみ変わる） */
    const PDF_REMARK_LOCK_HEIGHT_SCALE_WHEN_5_ROWS = 0.76;

    function adjustDensity() {
      const tc = state.taskCount;
      const rc = state.remarkCount;
      /* 作業員・作業内容（画面）の行高基準を揃える：12段・作業・備考のいずれかが多い側に追随 */
      const densityN = Math.max(12, tc, rc);
      /* 作業員行高＝PDF12名列ロックと同じ基準 refPx（density(densityN)+EXTRA） */
      const workerRefPx = densityRowHeightPx(densityN) + PDF_WORKER_COL_REF_EXTRA_PX;
      document.documentElement.style.setProperty("--worker-row-h", `${workerRefPx}px`);
      /*
       * 作業内容（画面のみ）：行を増やすたびに作業員と同じ高さの「段」が下に積まれるよう、
       * PDF の 6×ref÷行数（行が増えるほど各行が縮む）は使わず、作業員行と同じ refPx を 1 行に使う。
       * 画面の作業員人数を増やしたときは行高は変えず下に段を足す（行の詰めは PDF のみ）。
       */
      document.documentElement.style.setProperty("--task-row-h", `${workerRefPx}px`);
      /*
       * 備考（画面）：行を足すだけで下に段を積む。1 行の高さは作業員・作業内容と同じ workerRefPx に揃え、
       * 作業段数を増やしたときに備考だけ別密度になって枠・段取りがズレるのを防ぐ（例: 作業13行）。
       * 備考段数 rc では行高は変えない（密度は densityN = max(12, tc, rc) のみで決まる）。
       */
      document.documentElement.style.setProperty("--remark-row-h", `${workerRefPx}px`);
      requestAnimationFrame(applyPaperFitScale);
      requestAnimationFrame(applyScreenPdfLikeLayout);
    }

    function findWorkerRowByNumLabel(label) {
      return [...document.querySelectorAll("#wLeft .w-row, #wRight .w-row")].find((r) => {
        const numCell = r.querySelector(":scope > div:first-child");
        return numCell && numCell.textContent.trim() === label;
      });
    }

    function mountWorkersAddBtn(hostEl) {
      const host = hostEl || document.getElementById("workersAddRow");
      if (!host) return;
      const wc = state.workerCount;
      const labels = [];
      if (wc > 14) {
        /* 14 を超えて増えたら、常に最終行（番号 = 人数） */
        labels.push(String(wc));
      } else {
        if (wc >= 14) labels.push("14");
        if (wc >= 12) labels.push("12");
        if (wc > 0) labels.push(String(wc));
      }
      let row = null;
      for (const lab of labels) {
        row = findWorkerRowByNumLabel(lab);
        if (row) break;
      }
      if (!row) {
        const rightRows = document.querySelectorAll("#wRight .w-row");
        if (rightRows.length) row = rightRows[rightRows.length - 1];
        else {
          const leftRows = document.querySelectorAll("#wLeft .w-row");
          if (leftRows.length) row = leftRows[leftRows.length - 1];
        }
      }
      if (!row) {
        document.querySelector(".workers")?.appendChild(host);
        return;
      }
      const nw = row.querySelector(".name-wrap");
      if (nw) nw.appendChild(host);
    }

        ...wLeft.querySelectorAll(".w-row .worker-name"),
        ...wRight.querySelectorAll(".w-row .worker-name"),

      const prevOts = [
        ...wLeft.querySelectorAll(".w-row .worker-ot"),
        ...wRight.querySelectorAll(".w-row .worker-ot"),
      ].map((el) => el.value);

      wRight.innerHTML = "";

    function buildTasks() {
      const prevPayload = [...taskRows.querySelectorAll(":scope > .t-row")].map((row) => {

      const host = document.getElementById("tasksAddRow");

      taskRows.innerHTML = "";
      for (let i = 0; i < state.taskCount; i++) {

            </div>

              <input class="task-hours sheet-target" type="text" inputmode="decimal" data-list-key="_overtime" readonly />
            </div>
          </div>
          <div><span class="circled active">請</span>・<span class="circled">常</span></div>
        `;
        taskRows.appendChild(row);
        const opts = row.querySelectorAll(".circled");
        opts.forEach((o) => o.addEventListener("click", () => {
          opts.forEach((x) => x.classList.remove("active"));
          o.classList.add("active");

      }
      const newRows = taskRows.querySelectorAll(":scope > .t-row");
      const lim = Math.min(prevPayload.length, newRows.length);
      for (let i = 0; i < lim; i++) {
        const p = prevPayload[i];
        const nr = newRows[i];
        const te = nr.querySelector(".task-type");
        const se = nr.querySelector(".task-sector");
        const de = nr.querySelector(".task-detail");

        if (se) se.value = p.taskSector ?? "";
        if (de) de.value = p.taskDetail;
        if (me) me.value = p.taskMan;
        if (he) he.value = p.taskHours;

          c.classList.toggle("active", idx === p.contractIndex);
        });

      for (let i = lim; i < newRows.length; i++) {
        syncTaskContractMarkForRow(newRows[i]);
      }
      mountTasksAddBtn(host);
    }

      const yEl = document.getElementById("year");

      const yy = parseInt(yEl.value, 10);
      const mm = parseInt(mEl.value, 10);
      const dd = parseInt(dEl.value, 10);
      if (!yEl.value.trim() || !mEl.value.trim() || !dEl.value.trim() ||

    /**
     * A4 縦に用紙画像を配置。
     * ・1ページに収まるとき: 従来の contain（min(横スケール,縦スケール)）— 12名で縦優先になることもある
     * ・印刷幅いっぱいにしたときの縦が innerH を超えるときだけ: 幅は innerW 固定で複数ページ（14名など）
     * 常に幅いっぱいにすると、12名側が縦優先だったケースより拡大して見えるため分岐する。
     */
    function addCanvasToA4PortraitPdf(pdf, canvas, capScale, margin) {
      const pxToMm = 25.4 / 96;
      const cssPxW = canvas.width / capScale;
      const cssPxH = canvas.height / capScale;
      const imgWmm = cssPxW * pxToMm;
      const imgHmm = cssPxH * pxToMm;
      const pageW = 210;
      const pageH = 297;
      const innerW = pageW - margin.left - margin.right;
      const innerH = pageH - margin.top - margin.bottom;
      const imgAspect = cssPxW / cssPxH;
      const fullWidthDrawHmm = innerW / imgAspect;
      const yTop = margin.top;

      if (fullWidthDrawHmm > innerH + 0.02) {
        const splitDrawW = innerW;
        const splitDrawH = fullWidthDrawHmm;
        const nPages = Math.ceil(splitDrawH / innerH);
        let accMm = 0;
        for (let p = 0; p < nPages; p++) {
          if (p > 0) pdf.addPage();
          const pageDrawHmm = Math.min(innerH, splitDrawH - accMm);
          const t0 = accMm / splitDrawH;
          const t1 = (accMm + pageDrawHmm) / splitDrawH;
          accMm += pageDrawHmm;
          const y0css = t0 * cssPxH;
          const y1css = t1 * cssPxH;
          const sy = Math.max(0, Math.floor(y0css * capScale));
          const ey = Math.min(canvas.height, Math.ceil(y1css * capScale));
          const sh = Math.max(1, ey - sy);
          const slice = document.createElement("canvas");
          slice.width = canvas.width;
          slice.height = sh;
          slice.getContext("2d").drawImage(canvas, 0, sy, canvas.width, sh, 0, 0, canvas.width, sh);
          pdf.addImage(slice.toDataURL("image/png"), "PNG", margin.left, yTop, splitDrawW, pageDrawHmm, undefined, "FAST");
        }
        return;
      }

      const scale = Math.min(innerW / imgWmm, innerH / imgHmm);
      const drawW = imgWmm * scale;
      const drawH = imgHmm * scale;
      const x = margin.left + (innerW - drawW) / 2;
      pdf.addImage(canvas.toDataURL("image/png"), "PNG", x, yTop, drawW, drawH, undefined, "FAST");
    }

    /* iPhone Safari の viewport 調整は meta viewport 固定で対応（動的変更は反映されにくい） */

    async function createPdfFile() {
      await ensurePdfLibs();
      closeFieldSheet();
      const paper = document.getElementById("paper");
      const useViewport = pdfUseViewportCapture();
      let pdfWorkerRowRestore = false;
      let pdfTaskColRestore = false;
      let pdfRemarkColRestore = false;
      document.body.classList.add("pdf-render");
      /* html2canvas のクローンでは body に pdf-render が付かないことがあるため、#paper 側で PDF 用レイアウトを掛ける */
      if (paper) paper.setAttribute("data-pdf-capture", "1");
      /*
       * 方針1: 作業員が偶数かつ12名以上は列ロック（12・14で片列の合計が一致。行は flex 均等）。
       * ref は pdfTaskColLockRefPx（作業・備考の段数では変えず常に12相当密度）で作業内容枠と同じ合計 6×ref に揃える。
       * 12名超のみ data-pdf-worker-compress で早・残・氏名の詰め。
       */
      if (paper && state.workerCount >= 12 && state.workerCount % 2 === 0) {
        const refPx = pdfTaskColLockRefPx(state.taskCount, state.remarkCount);
        const rowsPerHalf = state.workerCount / 2;
        const rowsPerHalfAt12 = 6;
        const colDataPx = rowsPerHalfAt12 * refPx;
        const eachPx = colDataPx / rowsPerHalf;
        paper.style.setProperty("--pdf-workers-col-data-h", `${colDataPx}px`);
        paper.style.setProperty("--pdf-worker-rows-per-half", String(rowsPerHalf));
        paper.style.setProperty("--pdf-worker-row-h", `${eachPx}px`);
        paper.setAttribute("data-pdf-worker-col-lock", "1");
        if (state.workerCount > 12) paper.setAttribute("data-pdf-worker-compress", "1");
        pdfWorkerRowRestore = true;
      }
      if (paper && state.taskCount >= 6) {
        /* 合計高は常に 6×ref（ref は PDF_LOCK_FRAME_DENSITY_N=12 のみ。作業・備考の段数では枠は変わらず行数で割るだけ） */
        const taskRefPx = pdfTaskColLockRefPx(state.taskCount, state.remarkCount);
        const taskColDataPx = pdfTaskColLockTotalDataHeightPx(state.taskCount, state.remarkCount);
        const eachTaskPx = pdfTaskColLockEachRowPx(state.taskCount, state.remarkCount);
        paper.style.setProperty("--pdf-tasks-col-data-h", `${taskColDataPx}px`);
        paper.style.setProperty("--pdf-task-rows-count", String(state.taskCount));
        paper.style.setProperty("--pdf-task-row-h", `${eachTaskPx}px`);
        paper.setAttribute("data-pdf-task-col-lock", "1");
        if (state.taskCount >= 11) paper.setAttribute("data-pdf-task-num-dense", "1");
        pdfTaskColRestore = true;
      }
      if (paper && state.remarkCount >= 5) {
        /* 画面は通常の備考レイアウトのまま。PDF キャプチャ時だけ 5×ref で合計を固定（html2canvas クローン用に body 非依存の属性） */
        const remarkRefPx = pdfTaskColLockRefPx(state.taskCount, state.remarkCount);
        /* 合計は常に「5×ref×係数」（行数に依存しない）。+で6段以上でも同じ合計 px を remarkCount で均等割り */
        const remarkColBasePx =
          PDF_REMARK_COL_LOCK_BASE_ROWS * remarkRefPx +
          PDF_REMARK_COL_LOCK_BASE_ROWS * PDF_REMARK_COL_LOCK_PER_ROW_BUMP_PX;
        const remarkColDataPx = Math.round(
          remarkColBasePx * PDF_REMARK_LOCK_HEIGHT_SCALE_WHEN_5_ROWS
        );
        paper.style.setProperty("--pdf-remarks-col-data-h", `${remarkColDataPx}px`);
        paper.style.setProperty("--pdf-remark-rows-count", String(state.remarkCount));
        paper.setAttribute("data-pdf-remark-col-lock", "1");
        if (state.remarkCount >= 10) paper.setAttribute("data-pdf-remark-dense", "1");
        if (state.remarkCount >= 12) paper.setAttribute("data-pdf-remark-xdense", "1");
        pdfRemarkColRestore = true;
      }
      await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
      /*
       * #paper に min-height: var(--paper-h) があると、内容より長いビットマップになり
       * A4 contain で実効の縮小率だけ上がる。デスクトップ PDF ではキャプチャ直前だけ
       * 高さを内容に合わせる（終了後に必ず元に戻す）。
       */
      let paperHRestore = null;
      if (!useViewport && paper) {
        paperHRestore = { minH: paper.style.minHeight, h: paper.style.height };
        paper.style.minHeight = "0";
        paper.style.height = "auto";
        void paper.offsetHeight;
        paper.style.height = `${Math.ceil(paper.scrollHeight)}px`;
      }
      let canvas;
      let capScale = 3;
      const h2cOnClone = (clonedDoc) => {
        applyDatePdfCloneStyles(clonedDoc);
        applyWorkerFieldsPdfCloneOverlay(clonedDoc);
        applyTaskManHoursPdfCloneOverlay(clonedDoc);
        applyTaskTypeDetailPdfCloneOverlay(clonedDoc);
      };
      try {
        if (useViewport) {
          /* スマホ：表示中のブラウザ画面（ビューポート）をそのまま1枚に焼く */
          capScale = Math.min(2.5, Math.max(1.5, window.devicePixelRatio || 1) * 1.25);
          const sx = window.scrollX;
          const sy = window.scrollY;
          const vw = document.documentElement.clientWidth;
          const vh = document.documentElement.clientHeight;
          canvas = await html2canvas(document.body, {
            scale: capScale,
            useCORS: true,
            backgroundColor: "#eceff3",
            x: sx,
            y: sy,
            width: vw,
            height: vh,
            windowWidth: document.documentElement.scrollWidth,
            windowHeight: document.documentElement.scrollHeight,
            ignoreElements: (el) => el.classList?.contains("workers-add-row"),
            onclone: h2cOnClone,
          });
        } else {
          canvas = await html2canvas(paper, {
            scale: capScale,
            useCORS: true,
            backgroundColor: "#fff",
            windowWidth: paper.scrollWidth,
            windowHeight: paper.scrollHeight,
            ignoreElements: (el) => el.classList?.contains("workers-add-row"),
            onclone: h2cOnClone,
          });
        }
      } finally {
        if (paperHRestore && paper) {
          paper.style.minHeight = paperHRestore.minH;
          paper.style.height = paperHRestore.h;
        }
        if (paper && pdfWorkerRowRestore) {
          paper.style.removeProperty("--pdf-worker-row-h");
          paper.style.removeProperty("--pdf-workers-col-data-h");
          paper.style.removeProperty("--pdf-worker-rows-per-half");
          paper.removeAttribute("data-pdf-worker-col-lock");
          paper.removeAttribute("data-pdf-worker-compress");
        }
        if (paper && pdfTaskColRestore) {
          paper.style.removeProperty("--pdf-tasks-col-data-h");
          paper.style.removeProperty("--pdf-task-rows-count");
          paper.style.removeProperty("--pdf-task-row-h");
          paper.removeAttribute("data-pdf-task-col-lock");
          paper.removeAttribute("data-pdf-task-num-dense");
        }
        if (paper && pdfRemarkColRestore) {
          paper.style.removeProperty("--pdf-remarks-col-data-h");
          paper.style.removeProperty("--pdf-remark-rows-count");
          paper.removeAttribute("data-pdf-remark-col-lock");
          paper.removeAttribute("data-pdf-remark-dense");
          paper.removeAttribute("data-pdf-remark-xdense");
        }
        if (paper) paper.removeAttribute("data-pdf-capture");
        document.body.classList.remove("pdf-render");
        requestAnimationFrame(() => requestAnimationFrame(applyPaperFitScale));
      }
      const { jsPDF } = window.jspdf;
      const pxToMm = 25.4 / 96;
      const cssPxW = canvas.width / capScale;
      const cssPxH = canvas.height / capScale;
      let pdf;
      if (useViewport) {
        const img = canvas.toDataURL("image/png");
        const mmW = cssPxW * pxToMm;
        const mmH = cssPxH * pxToMm;
        pdf = new jsPDF({ unit: "mm", format: [mmW, mmH], compress: true });
        pdf.addImage(img, "PNG", 0, 0, mmW, mmH, undefined, "FAST");
      } else {
        pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
        /* 上余白 6mm（指定）。下余白 0mm。左右 14mm */
        const margin = { top: 6, right: 14, bottom: 0, left: 14 };
        addCanvasToA4PortraitPdf(pdf, canvas, capScale, margin);
      }
      const blob = pdf.output("blob");
      const d = new Date();
      const ymd = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, "0")}${String(d.getDate()).padStart(2, "0")}`;
      const siteEl = document.getElementById("siteName");
      const siteRaw =
        siteEl && "value" in siteEl ? String(siteEl.value || "").trim() : String(siteEl?.textContent || "").trim();
      const sitePart = (() => {
        if (!siteRaw) return "現場名未入力";
        const t = siteRaw
          .replace(/[\u0000-\u001f\\/*?:"<>|]/g, "_")
          .replace(/\s+/g, " ")

        return t || "現場名未入力";

     * その所属のブロック先頭行を一覧スクロール領域の上端から表示する。空入力で一覧先頭へ。
     */
    function scrollListsModalToWorkerCompany(companyQuery) {
      if (!listsModalBody) return;
      const scrollHost = listsModalBody.querySelector(".lists-modal-list-scroll");
      const q = String(companyQuery ?? "").trim();
      if (!q) {
        if (scrollHost) scrollHost.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }
      const lis = listsModalBody.querySelectorAll("li.lists-modal-li-row[data-worker-company]");
      let best = null;
      let bestRank = 0;
      for (const li of lis) {
        const co = String(li.getAttribute("data-worker-company") || "").trim();
        if (!co) continue;
        let rank = 0;
        if (co === q) rank = 3;
        else if (co.startsWith(q)) rank = 2;
        else if (q.length >= 2 && co.includes(q)) rank = 1;
        if (rank > bestRank) {
          bestRank = rank;
          best = li;
          if (bestRank === 3) break;
        }
      }
      if (!best || bestRank === 0) return;
      const anchorCo = String(best.getAttribute("data-worker-company") || "").trim();
      let anchorLi = best;
      if (anchorCo) {
        for (const li of lis) {
          if (String(li.getAttribute("data-worker-company") || "").trim() === anchorCo) {
            anchorLi = li;
            break;
          }
        }
      }
      if (scrollHost) {
        const hostTop = scrollHost.getBoundingClientRect().top;
        const liTop = anchorLi.getBoundingClientRect().top;
        const nextTop = scrollHost.scrollTop + (liTop - hostTop);
        scrollHost.scrollTo({ top: Math.max(0, nextTop), behavior: "smooth" });
      } else {
        anchorLi.scrollIntoView({ block: "start", behavior: "smooth" });
      }
      anchorLi.classList.remove("lists-modal-li-jump-flash");
      void anchorLi.offsetWidth;
      anchorLi.classList.add("lists-modal-li-jump-flash");
      const rm = () => anchorLi.classList.remove("lists-modal-li-jump-flash");
      anchorLi.addEventListener("animationend", rm, { once: true });
      window.setTimeout(rm, 1200);

    let drawing = false, lx = 0, ly = 0;
    function resizeCanvas() {
      const r = sigCanvas.getBoundingClientRect();
      sigCanvas.width = r.width; sigCanvas.height = r.height;
      sctx.globalAlpha = 1;
      sctx.shadowBlur = 0;
      sctx.lineWidth = 5;
      sctx.lineCap = "round";
      sctx.lineJoin = "round";
      sctx.strokeStyle = "#000000";
      /* 透明背景の PNG で保存（画面上は #signatureCanvas の白背景が見える） */
      sctx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
      if (state.signatureData) {
        const img = new Image();
        img.onload = () => sctx.drawImage(img, 0, 0, sigCanvas.width, sigCanvas.height);
        img.src = state.signatureData;
      }
    }
    function pos(ev) { const r = sigCanvas.getBoundingClientRect(); const p = ev.touches ? ev.touches[0] : ev; return { x: p.clientX - r.left, y: p.clientY - r.top }; }
    function start(ev) { drawing = true; const p = pos(ev); lx = p.x; ly = p.y; }
    function move(ev) { if (!drawing) return; ev.preventDefault(); const p = pos(ev); sctx.beginPath(); sctx.moveTo(lx, ly); sctx.lineTo(p.x, p.y); sctx.stroke(); lx = p.x; ly = p.y; }
    function end() { drawing = false; }

      /* 親の幅＝住所1行の実幅（計測中だけ住所を max-content にして圧縮されないようにする） */
      const prevAddrW = addr.style.width;
      addr.style.width = "max-content";
      void addr.offsetWidth;
      let w = Math.ceil(addr.getBoundingClientRect().width);
      addr.style.width = prevAddrW || "";
      void root.offsetWidth;
      const maxW = Math.floor(footer.getBoundingClientRect().width - 32);
