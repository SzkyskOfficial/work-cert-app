      if (!footerCompanyLogo) return;
      try {
        const d = localStorage.getItem(FOOTER_LOGO_KEY);
        if (d && d.startsWith("data:image")) {
          footerCompanyLogo.src = d;
          refreshFooterLogoClass();
          return;
        }
      } catch (_) {}
      footerCompanyLogo.removeAttribute("src");
      refreshFooterLogoClass();
    }

    function loadFooterLogo() {
      if (!footerCompanyLogo || !footerLogoWrap) return;
      const img = footerCompanyLogo;
      img.onload = () => {
        img.onload = null;
        img.onerror = null;
        refreshFooterLogoClass();
      };
      img.onerror = () => {
        img.onload = null;
        img.onerror = null;
        applyFooterLogoStorageFallback();
      };
      img.src = FOOTER_LOGO_FILE;
    }

    /** 公開URLの更新検知: data-rev が変わったら自動リロード（キャッシュが残る通常タブ対策） */
    const APP_BUILD_REV = String(document.documentElement?.getAttribute("data-rev") || "").trim();
    let updateCheckInflight = false;
    let updateReloadScheduled = false;
    async function checkForRemoteUpdate() {
      if (updateCheckInflight || updateReloadScheduled) return;
      if (!APP_BUILD_REV) return;
      updateCheckInflight = true;
      try {
        const bust = Date.now();
        const url = `${location.origin}${location.pathname}?__revcheck=${bust}`;
        const res = await fetch(url, {
          cache: "no-store",
          credentials: "same-origin",
        });
        if (!res.ok) return;
        const txt = await res.text();
        const m = txt.match(/<html[^>]*\sdata-rev="([^"]+)"/i);
        const remoteRev = String(m?.[1] || "").trim();
        if (remoteRev && remoteRev !== APP_BUILD_REV) {
          updateReloadScheduled = true;
          location.reload();
        }
      } catch (_) {
        /* オフライン時などは無視 */
      } finally {
        updateCheckInflight = false;
      }
    }
    function initAutoUpdateCheck() {
      const INTERVAL_MS = 90000;
      setInterval(() => {
        void checkForRemoteUpdate();
      }, INTERVAL_MS);
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) void checkForRemoteUpdate();
      });
      window.addEventListener("focus", () => {
        void checkForRemoteUpdate();
      });
      setTimeout(() => {
        void checkForRemoteUpdate();
      }, 10000);
    }

    let sharedSyncReady = false;
    let sharedSyncPaused = false;
    let sharedSyncTimer = 0;
    let sharedPushInflight = false;
    let sharedCurrentCode = "";
    let sharedDocRef = null;
    let sharedUnsub = null;
    let sharedLastAppliedJson = "";
    let sharedLastPushedJson = "";
    let sharedPendingRemotePayload = null;
    let sharedRemoteApplyTimer = 0;
    let sharedUserActiveUntil = 0;
    let sharedLocalSaveTimer = 0;
    let sharedConnectTimer = 0;
    let sharedToastHideTimer = 0;
    let sharedLastToastMessage = "";
    let sharedInitialRemoteLoaded = false;
    const sharedSyncToastEl = document.getElementById("sharedSyncToast");

    function showSharedSyncToast(message, kind = "", holdMs = 1300) {
      if (!sharedSyncToastEl || !message) return;
      const msg = String(message);
      const tone = String(kind || "");
      if (sharedToastHideTimer) {
        clearTimeout(sharedToastHideTimer);
        sharedToastHideTimer = 0;
      }
      if (sharedLastToastMessage !== msg || !sharedSyncToastEl.classList.contains("show")) {
        sharedSyncToastEl.textContent = msg;
        sharedLastToastMessage = msg;
      }
      sharedSyncToastEl.classList.remove("success", "warn", "error");
      if (tone === "success" || tone === "warn" || tone === "error") {
        sharedSyncToastEl.classList.add(tone);
      }
      sharedSyncToastEl.classList.add("show");
      if (holdMs <= 0) return;
      sharedToastHideTimer = window.setTimeout(() => {
        sharedSyncToastEl.classList.remove("show");
        sharedToastHideTimer = 0;
      }, holdMs);
    }

    function getStoredShareCode() {
      try {
        return String(localStorage.getItem(SHARE_CODE_KEY) || "").trim();
      } catch (_) {
        return "";
      }
    }
    function sharedSnapshotStorageKey(code) {
      const c = normalizeShareCode(code);
      return SHARED_SNAPSHOT_KEY_PREFIX + (c || "default");
    }
    function saveSharedSnapshotToLocal(code, payload) {
      try {
        localStorage.setItem(sharedSnapshotStorageKey(code), JSON.stringify(payload || {}));
      } catch (_) {}
    }
    function loadSharedSnapshotFromLocal(code) {
      try {
        const t = localStorage.getItem(sharedSnapshotStorageKey(code));
        return t ? JSON.parse(t) : null;
      } catch (_) {
        return null;
      }
    }
    function setStoredShareCode(code) {
      try {
        if (code) localStorage.setItem(SHARE_CODE_KEY, code);
        else localStorage.removeItem(SHARE_CODE_KEY);
      } catch (_) {}
    }
    function normalizeShareCode(raw) {
      return String(raw || "")
        .trim()
        .replace(/\s+/g, "-")
        .replace(/[^0-9A-Za-z_-]/g, "")
        .slice(0, 40);
    }
    function updateShareCodeButton() {
      const btn = document.getElementById("shareCodeBtn");
      if (!btn) return;
      btn.textContent = sharedCurrentCode ? `共有コード:${sharedCurrentCode}` : "共有コード";
      btn.title = sharedCurrentCode ? `共有コード: ${sharedCurrentCode}` : "共有コードを設定";
    }
    function markSharedUserInteraction() {
      sharedUserActiveUntil = Date.now() + 1800;
    }
    function isSharedUiBusy() {
      return Boolean(
        Date.now() < sharedUserActiveUntil ||
        fieldSheet?.classList.contains("active") ||
        listsModal?.classList.contains("active") ||
        sigModal?.classList.contains("active")
      );
    }
    function flushPendingSharedSnapshot() {
      if (!sharedPendingRemotePayload || isSharedUiBusy()) return;
      const payload = sharedPendingRemotePayload;
      sharedPendingRemotePayload = null;
      applySharedSnapshot(payload);
    }
    function scheduleLocalSharedSnapshotSave() {
      if (!sharedCurrentCode) return;
      if (sharedSyncPaused) return;
      if (sharedLocalSaveTimer) clearTimeout(sharedLocalSaveTimer);
      sharedLocalSaveTimer = window.setTimeout(() => {
        sharedLocalSaveTimer = 0;
        if (!sharedCurrentCode) return;
        if (isSharedUiBusy()) {
          scheduleLocalSharedSnapshotSave();
          return;
        }
        runWhenIdle(() => {
          try {
            showSharedSyncToast("データ保存中", "warn", 900);
            const payload = captureAppSnapshot();
            saveSharedSnapshotToLocal(sharedCurrentCode, payload);
            showSharedSyncToast("データ保存完了", "success", 1200);
          } catch (_) {}
        }, 2500);
      }, 1200);
    }
    function scheduleApplySharedSnapshot(payload) {
      sharedPendingRemotePayload = payload;
      if (sharedRemoteApplyTimer) clearTimeout(sharedRemoteApplyTimer);
      const waitMs = isSharedUiBusy() ? 1200 : 180;
      sharedRemoteApplyTimer = window.setTimeout(() => {
        sharedRemoteApplyTimer = 0;
        if (isSharedUiBusy()) {
          scheduleApplySharedSnapshot(sharedPendingRemotePayload);
          return;
        }
        flushPendingSharedSnapshot();
      }, waitMs);
    }
    function isPhoneLikeScreen() {
      return window.matchMedia("(max-width: 900px)").matches;
    }
    function scheduleSharedConnect(delayMs = 0) {
      if (!sharedCurrentCode) return;
      if (sharedSyncReady && sharedDocRef) return;
      if (sharedConnectTimer) clearTimeout(sharedConnectTimer);
      sharedConnectTimer = window.setTimeout(() => {
        sharedConnectTimer = 0;
        if (isSharedUiBusy()) {
          scheduleSharedConnect(3000);
          return;
        }
        runWhenIdle(() => {
          void (async () => {
            try {
              await startSharedSyncIfNeeded();
              await connectSharedDocument();
            } catch (err) {
              console.warn("共有接続に失敗しました", err);
            }
          })();
        }, 6000);
      }, delayMs);
    }
    async function promptAndSetShareCode() {
      const current = sharedCurrentCode || getStoredShareCode();
      const raw = window.prompt("共有コードを入力してください（同じコード同士で同期します）", current || "default");
      if (raw == null) return false;
      const code = normalizeShareCode(raw);
      if (!code) {
        alert("共有コードを入力してください。");
        return false;
      }
      if (code === sharedCurrentCode) return true;
      sharedCurrentCode = code;
      setStoredShareCode(code);
      updateShareCodeButton();
      if (sharedUnsub) {
        sharedUnsub();
        sharedUnsub = null;
      }
      sharedDocRef = null;
      sharedLastAppliedJson = "";
      sharedLastPushedJson = "";
      sharedInitialRemoteLoaded = false;
      if (sharedSyncReady) await connectSharedDocument();
      return true;
    }
    function captureAppSnapshot() {
      return {
        lists: JSON.parse(JSON.stringify(lists)),
        state: {
          workerCount: state.workerCount,
          taskCount: state.taskCount,
          remarkCount: state.remarkCount,
          signatureData: state.signatureData || "",
          shift: state.shift || "day",
        },
        header: {
          year: document.getElementById("year")?.value || "",
          month: document.getElementById("month")?.value || "",
          day: document.getElementById("day")?.value || "",
          companyName: document.getElementById("companyName")?.value || "",
          siteName: document.getElementById("siteName")?.value || "",
        },
        workers: [...document.querySelectorAll("#wLeft .w-row, #wRight .w-row")].map((row) => ({
          name: row.querySelector(".worker-name")?.value || "",
          ot: row.querySelector(".worker-ot")?.value || "",
        })),
        tasks: [...document.querySelectorAll("#taskRows .t-row")].map((row) => {
          let contractIndex = 0;
          row.querySelectorAll(".circled").forEach((el, idx) => {
            if (el.classList.contains("active")) contractIndex = idx;
          });
          return {
            taskType: row.querySelector(".task-type")?.value || "",
            taskSector: row.querySelector(".task-sector")?.value || "",
            taskDetail: row.querySelector(".task-detail")?.value || "",
            taskMan: row.querySelector(".task-man")?.value || "",
            taskHours: row.querySelector(".task-hours")?.value || "",
            contractIndex,
          };
        }),
        remarks: [...document.querySelectorAll("#remarkRows textarea")].map((t) => t.value || ""),
      };
    }
    function applySharedLists(nextLists) {
      const src = nextLists && typeof nextLists === "object" ? nextLists : {};
      lists.companies = Array.isArray(src.companies) ? src.companies : [];
      lists.sites = Array.isArray(src.sites) ? src.sites : [];
      lists.workers = Array.isArray(src.workers) ? src.workers : [];
      lists.workTypes = Array.isArray(src.workTypes) ? src.workTypes : [];
      lists.workSectors = Array.isArray(src.workSectors) ? src.workSectors : [];
      lists.workDetails = Array.isArray(src.workDetails) ? src.workDetails : [];
      lists.companies = sortJapaneseStrings(dedupeStringList(lists.companies), {
        pinToTop: COMPANY_PIN_TOP,
        modalScriptOrder: true,
      });
      lists.sites = sortJapaneseStrings(dedupeStringList(lists.sites), { modalScriptOrder: true });
      lists.workTypes = sortJapaneseStrings(dedupeStringList(lists.workTypes), { modalScriptOrder: true });
      lists.workSectors = sortJapaneseStrings(dedupeStringList(lists.workSectors), { modalScriptOrder: true });
      lists.workDetails = sortJapaneseStrings(dedupeStringList(lists.workDetails), { modalScriptOrder: true });
      migrateWorkersList();
      persistWorkersSorted();
      saveLists();
      if (listsModal?.classList.contains("active")) renderListsModalBody();
      if (fieldSheet?.classList.contains("active") && sheetTarget?.dataset?.listKey) {
        const currentTarget = sheetTarget;
        closeFieldSheet();
        openFieldSheet(currentTarget, currentTarget.dataset.listKey);
      }
    }
    function applySharedSnapshot(payload) {
      if (!payload || typeof payload !== "object") return;
      sharedSyncPaused = true;
      try {
        saveSharedSnapshotToLocal(sharedCurrentCode, payload);
        applySharedLists(payload.lists);
        const nextState = payload.state || {};
        state.workerCount = Number(nextState.workerCount) || DEFAULT_GRID_ROWS.workerCount;
        state.taskCount = Number(nextState.taskCount) || DEFAULT_GRID_ROWS.taskCount;
        state.remarkCount = Number(nextState.remarkCount) || DEFAULT_GRID_ROWS.remarkCount;
        state.signatureData = String(nextState.signatureData || "");
        state.shift = nextState.shift === "night" ? "night" : "day";
        adjustDensity();
        buildWorkers();
        buildTasks();
        buildRemarks();
        const header = payload.header || {};
        document.getElementById("year").value = String(header.year || "");
        document.getElementById("month").value = String(header.month || "");
        document.getElementById("day").value = String(header.day || "");
        document.getElementById("companyName").value = String(header.companyName || "");
        document.getElementById("siteName").value = String(header.siteName || "");
        const workerRows = [...document.querySelectorAll("#wLeft .w-row, #wRight .w-row")];
        workerRows.forEach((row, idx) => {
          const item = payload.workers?.[idx] || {};
          const nameEl = row.querySelector(".worker-name");
          const otEl = row.querySelector(".worker-ot");
          if (nameEl) nameEl.value = String(item.name || "");
          if (otEl) otEl.value = String(item.ot || "");
        });
        [...document.querySelectorAll("#taskRows .t-row")].forEach((row, idx) => {
          const item = payload.tasks?.[idx] || {};
          const setv = (sel, val) => {
            const el = row.querySelector(sel);
            if (el) el.value = String(val || "");
          };
          setv(".task-type", item.taskType);
          setv(".task-sector", item.taskSector);
          setv(".task-detail", item.taskDetail);
          setv(".task-man", item.taskMan);
          setv(".task-hours", item.taskHours);
          row.querySelectorAll(".circled").forEach((el, circIdx) => {
            el.classList.toggle("active", circIdx === Number(item.contractIndex || 0));
          });
          syncTaskContractMarkForRow(row);
        });
        [...document.querySelectorAll("#remarkRows textarea")].forEach((el, idx) => {
          el.value = String(payload.remarks?.[idx] || "");
        });
        document.getElementById("shiftDay").classList.toggle("active", state.shift === "day");
        document.getElementById("shiftNight").classList.toggle("active", state.shift === "night");
        document.getElementById("signImage").src = state.signatureData || "";
        refreshSignSlotClass();
        refreshWeekday();
        refreshTotals();
      } finally {
        sharedSyncPaused = false;
      }
    }
    function scheduleSharedPush() {
      if (sharedSyncPaused || !sharedSyncReady || !sharedDocRef) return;
      if (sharedSyncTimer) clearTimeout(sharedSyncTimer);
      sharedSyncTimer = window.setTimeout(() => {
        sharedSyncTimer = 0;
        if (isSharedUiBusy()) {
          scheduleSharedPush();
          return;
        }
        runWhenIdle(() => {
          void pushSharedSnapshot();
        }, 4000);
      }, 3500);
    }
    async function pushSharedSnapshot() {
      if (sharedSyncPaused || !sharedSyncReady || !sharedDocRef || sharedPushInflight) return;
      if (isSharedUiBusy()) {
        scheduleSharedPush();
        return;
      }
      showSharedSyncToast("データ保存中", "warn", 900);
      sharedPushInflight = true;
      const payload = captureAppSnapshot();
      const json = JSON.stringify(payload);
      if (json === sharedLastPushedJson) {
        sharedPushInflight = false;
        showSharedSyncToast("データ保存完了", "success", 900);
        return;
      }
      sharedLastPushedJson = json;
      saveSharedSnapshotToLocal(sharedCurrentCode, payload);
      try {
        await sharedDocRef.set({
          code: sharedCurrentCode,
          payload,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true });
        showSharedSyncToast("データ保存完了", "success", 1200);
      } catch (err) {
        console.warn("共有保存に失敗しました", err);
        showSharedSyncToast("データ保存失敗", "error", 1600);
      } finally {
        sharedPushInflight = false;
      }
    }
    async function connectSharedDocument() {
      if (!sharedSyncReady || !sharedCurrentCode) return;
      showSharedSyncToast("共有データ受信中", "warn", 1200);
      const db = firebase.firestore();
      sharedDocRef = db.collection("sharedDocs").doc(sharedCurrentCode);
      sharedUnsub = sharedDocRef.onSnapshot((snap) => {
        if (snap.metadata?.hasPendingWrites) return;
        const data = snap.data();
        const payload = data?.payload;
        if (!payload) {
          scheduleSharedPush();
          return;
        }
        const json = JSON.stringify(payload);
        if (json === sharedLastAppliedJson) return;
        if (json === sharedLastPushedJson) {
          sharedLastAppliedJson = json;
          if (!sharedInitialRemoteLoaded) {
            sharedInitialRemoteLoaded = true;
            showSharedSyncToast("データ読み込み完了", "success", 1200);
          }
          return;
        }
        sharedLastAppliedJson = json;
        scheduleApplySharedSnapshot(payload);
        if (!sharedInitialRemoteLoaded) {
          sharedInitialRemoteLoaded = true;
          showSharedSyncToast("データ読み込み完了", "success", 1200);
        }
      }, (err) => {
        console.warn("共有受信に失敗しました", err);
        showSharedSyncToast("データ読み込み失敗", "error", 1600);
      });
      scheduleSharedPush();
    }
    async function startSharedSyncIfNeeded() {
      if (sharedSyncReady) return;
      showSharedSyncToast("共有に接続中", "warn", 1200);
      await ensureFirebaseLibs();
      await new Promise((r) => setTimeout(r, 0));
      firebase.initializeApp(FIREBASE_CONFIG);
      await firebase.auth().signInAnonymously();
      sharedSyncReady = true;
      document.addEventListener("input", () => {
        scheduleLocalSharedSnapshotSave();
        scheduleSharedPush();
      }, true);
      document.addEventListener("change", () => {
        scheduleLocalSharedSnapshotSave();
        scheduleSharedPush();
      }, true);
      document.addEventListener("pointerdown", markSharedUserInteraction, true);
      document.addEventListener("touchstart", markSharedUserInteraction, true);
      document.addEventListener("focusin", markSharedUserInteraction, true);
    }

    /**
     * 共有同期は「共有コード」操作時に開始する（初回表示を速くするため）。
     * 既に share code が保存されている端末だけ、アイドル時に同期を開始する。
     */
    async function initSharedSync() {
      const btn = document.getElementById("shareCodeBtn");
      sharedCurrentCode = normalizeShareCode(getStoredShareCode());
      updateShareCodeButton();

      if (btn) {
        btn.onclick = () => {
          void (async () => {
            const ok = await promptAndSetShareCode();
            if (!ok) return;
            if (isPhoneLikeScreen()) scheduleSharedConnect(8000);
            else {
              await startSharedSyncIfNeeded();
              await connectSharedDocument();
            }
          })();
        };
      }

      if (!sharedCurrentCode) return;
      /* まず端末内の最後の共有スナップショットで即復元（オフラインでも表示できる） */
      const localPayload = loadSharedSnapshotFromLocal(sharedCurrentCode);
      if (localPayload) {
        runWhenIdle(() => {
          try {
            applySharedSnapshot(localPayload);
          } catch (_) {}
        }, 1500);
      }
      /* 端末内へは常に保存（Firestore未接続でも、次回即表示できるように） */
      document.addEventListener("input", scheduleLocalSharedSnapshotSave, true);
      document.addEventListener("change", scheduleLocalSharedSnapshotSave, true);
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) scheduleLocalSharedSnapshotSave();
        else if (sharedCurrentCode && (!sharedSyncReady || !sharedDocRef)) {
          scheduleSharedConnect(isPhoneLikeScreen() ? 4000 : 1000);
        }
      });
      if (isPhoneLikeScreen()) {
        scheduleSharedConnect(12000);
        return;
      }
      await startSharedSyncIfNeeded();
      await connectSharedDocument();
    }

    function runWhenIdle(fn, timeout = 3000) {
      if (typeof fn !== "function") return;
      if ("requestIdleCallback" in window) window.requestIdleCallback(() => fn(), { timeout });
      else setTimeout(fn, Math.min(timeout, 1500));
    }

    setTodayToDateInputs();
    loadLists();
    resetGridRowsToDefault();
    runWhenIdle(() => {
      void refreshStoredWorkerReadingsFromKuroshiro().catch(() => {});
    }, 5000);
    loadFooterLogo();

    adjustDensity();
    buildWorkers();
    buildTasks();
    buildRemarks();
    refreshWeekday();
    requestAnimationFrame(() => {
      syncFooterColWidth();
      requestAnimationFrame(syncFooterColWidth);
    });
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(syncFooterColWidth).catch(() => {});
    }
    initPaperFitScaleWatching();
    /* 初回表示を優先して、更新チェックとPDF寄せレイアウトは後で開始 */
    const startPostInit = () => {
      initAutoUpdateCheck();
      applyScreenPdfLikeLayout();
      window.addEventListener("resize", () => requestAnimationFrame(applyScreenPdfLikeLayout), { passive: true });
    };
    if ("requestIdleCallback" in window) window.requestIdleCallback(startPostInit, { timeout: 2500 });
    else setTimeout(startPostInit, 1500);
    /* 初回表示を優先して、共有同期はアイドル時に開始（保存済みコードがある端末のみ） */
    const startShared = () => {
      void initSharedSync().catch((err) => {
        console.warn("共有同期の初期化に失敗しました", err);
      });
    };
    if ("requestIdleCallback" in window) {
      window.requestIdleCallback(startShared, { timeout: 3500 });
    } else {
      setTimeout(startShared, 2500);
    }
  </script>
</body>
